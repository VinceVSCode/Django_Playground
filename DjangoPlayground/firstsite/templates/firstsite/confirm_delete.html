{% extends "firstsite/base.html" %}
{% block title %}Delete: {{ note.title }}{% endblock %}
{% block content %}
<div class="card auth-card">
  <h1>Delete note</h1>
  <p>Are you sure you want to delete “{{ note.title }}”?</p>

  <form method="post">
    {% csrf_token %}
    <div class="form-actions">
      <button class="button button--danger" type="submit">Yes, delete</button>
      <a class="button" href="{% url 'note_detail' note.pk %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
